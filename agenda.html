<style>
:root {
  --bg-color: #FAFAFA;
  --surface: #FFFFFF;
  --text-main: #111827;
  --text-muted: #6B7280;
  --border: #E5E7EB;
  --primary: #0A84FF;
  --primary-soft: #E8F2FF;
  --danger: #FF3B30;
  --success: #34C759;
  --warning: #FF9500;
  --radius: 12px;
  --radius-lg: 16px;
  --chip-bg: #F2F2F7;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
body { display: flex; background-color: var(--bg-color); color: var(--text-main); height: 100vh; overflow: hidden; }

/* Sidebar (mesmo padrão das outras páginas) */
.sidebar { width: 260px; background-color: var(--bg-color); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 24px; z-index: 10; }
.sidebar-header h2 { font-size: 14px; font-weight: 600; }
.sidebar-header span { font-size: 12px; color: var(--text-muted); }
.nav-links { list-style: none; display: flex; flex-direction: column; gap: 2px; }
.nav-links li a { text-decoration: none; color: var(--text-muted); font-size: 14px; padding: 9px 12px; border-radius: 10px; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
.nav-links li a .nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-links li a:hover, .nav-links li a.active { background-color: #F3F4F6; color: var(--text-main); font-weight: 500; }
.nav-links li.nav-divider { height: 1px; background: var(--border); margin: 8px 4px; list-style: none; }

.main-content { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
.topbar { height: 60px; display: flex; align-items: center; justify-content: space-between; padding: 0 48px; border-bottom: 1px solid var(--border); background-color: var(--surface); position: sticky; top: 0; z-index: 5; }
.content-wrapper { padding: 32px 48px 64px; max-width: 1200px; margin: 0 auto; width: 100%; display: grid; grid-template-columns: 1fr 360px; gap: 24px; align-items: start; }

.page-header { grid-column: 1 / -1; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.page-header h1 { font-size: 24px; font-weight: 600; }
.month-nav { display: flex; align-items: center; gap: 12px; }
.month-nav button { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; width: 34px; height: 34px; font-size: 16px; cursor: pointer; }
.month-nav button:hover { border-color: var(--primary); color: var(--primary); }
.month-label { font-size: 15px; font-weight: 600; min-width: 160px; text-align: center; text-transform: capitalize; }
.btn-hoje { background: var(--chip-bg); border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

/* Calendário */
.calendar-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; }
.weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 8px; }
.weekday-row span { text-align: center; font-size: 12px; font-weight: 600; color: var(--text-muted); padding: 4px 0; }
.days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
.day-cell {
  aspect-ratio: 1; border-radius: 10px; border: 1px solid transparent;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; cursor: pointer; font-size: 13px; color: var(--text-main); position: relative;
  background: var(--bg-color); transition: 0.15s;
}
.day-cell:hover { border-color: var(--border); background: #F0F2F5; }
.day-cell.outro-mes { color: var(--text-muted); opacity: 0.4; cursor: default; }
.day-cell.outro-mes:hover { background: var(--bg-color); border-color: transparent; }
.day-cell.hoje { font-weight: 700; border-color: var(--primary); }
.day-cell.selecionado { background: var(--primary); color: white; }
.day-cell.selecionado .day-dot { background: white; }
.day-num { font-size: 13px; }
.day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--success); }
.day-cell.futuro { color: var(--text-muted); }

.legend-row { display: flex; gap: 16px; margin-top: 16px; font-size: 12px; color: var(--text-muted); flex-wrap: wrap; }
.legend-row span { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 7px; height: 7px; border-radius: 50%; }

/* Painel lateral de detalhes do dia */
.day-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; position: sticky; top: 16px; }
.day-panel-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; text-transform: capitalize; }
.day-panel-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 18px; }

.visit-item { display: flex; gap: 12px; padding: 12px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; text-decoration: none; color: var(--text-main); }
.visit-item:hover { border-color: #D1D5DB; }
.visit-icon { width: 30px; height: 30px; border-radius: 8px; background: var(--chip-bg); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.visit-icon.done { background: rgba(52,199,89,0.12); }
.visit-icon.pending { background: rgba(255,149,0,0.12); }
.visit-name { font-size: 13px; font-weight: 600; }
.visit-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.visit-obs { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-style: italic; }

.panel-section-label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin: 16px 0 8px; }
.panel-section-label:first-child { margin-top: 0; }
.estado-vazio { font-size: 13px; color: var(--text-muted); padding: 8px 0; }
.estado-vazio-futuro { font-size: 13px; color: var(--text-muted); background: var(--bg-color); border-radius: 10px; padding: 14px; text-align: center; }

@media (max-width: 900px) {
  .content-wrapper { grid-template-columns: 1fr; }
  .day-panel { position: static; }
}
@media (max-width: 768px) {
  body { flex-direction: column; height: auto; overflow: visible; }
  .sidebar { display: none; }
  .topbar, .content-wrapper { padding: 0 20px; }
  .content-wrapper { padding: 20px 20px 32px; }
}
</style>
</head>
<body>

<main class="main-content">
<header class="topbar">
<div style="font-size: 14px; color: var(--text-muted);">Agenda</div>
</header>
<div class="content-wrapper">

  <div class="page-header">
    <h1>Agenda</h1>
    <div class="month-nav">
      <button id="btnMesAnterior">‹</button>
      <span class="month-label" id="mesLabel">—</span>
      <button id="btnMesProximo">›</button>
      <button class="btn-hoje" id="btnHoje" style="margin-left: 4px;">Hoje</button>
    </div>
  </div>

  <div class="calendar-card">
    <div class="weekday-row">
      <span>Dom</span><span>Seg</span><span>Ter</span><span>Qua</span><span>Qui</span><span>Sex</span><span>Sáb</span>
    </div>
    <div class="days-grid" id="daysGrid"></div>
    <div class="legend-row">
      <span><span class="legend-dot" style="background: var(--success);"></span> Dia com visitas registradas</span>
      <span><span class="legend-dot" style="background: var(--primary); border: 1px solid var(--primary);"></span> Hoje</span>
    </div>
  </div>

  <div class="day-panel" id="dayPanel">
    <p class="estado-vazio">Carregando agenda...</p>
  </div>

</div>

<script>
/* ============================================================================
   Agenda - ACS Digital
   ----------------------------------------------------------------------------
   Como ainda não existe uma tabela de agendamento real (ex.: "visitas_agendadas"),
   esta página mostra:
     - Para dias PASSADOS e HOJE: o histórico real de visitas (tabela `visitas`).
     - Para HOJE especificamente: também o roteiro calculado (heurística de
       roteiro.js), separando pendentes e concluídas.
     - Para dias FUTUROS: um estado vazio honesto, já que não há agendamento
       real ainda (nenhum dado é inventado).
============================================================================ */

let dataReferencia = new Date();      // mês/ano sendo exibido
let diaSelecionadoISO = hojeISO();    // dia selecionado no painel lateral
let familiasGlobais = [];
let visitasGlobais = [];
let roteiroHojeGlobal = [];

function mapaFamiliasPorId(familias) {
  const m = new Map();
  familias.forEach(f => m.set(f.id, f));
  return m;
}

async function carregarAgenda() {
  try {
    const resultado = await carregarFamiliasEnriquecidas(); // roteiro.js
    familiasGlobais = resultado.familiasEnriquecidas;
    visitasGlobais = resultado.visitas;
  } catch (erro) {
    console.error(erro);
    document.getElementById('dayPanel').innerHTML = `<p class="estado-vazio">Não foi possível carregar a agenda agora.</p>`;
    return;
  }

  roteiroHojeGlobal = calcularRoteiroDoDia(familiasGlobais, CAPACIDADE_DIARIA_PADRAO);
  renderizarCalendario();
  renderizarPainelDia(diaSelecionadoISO);
}

function visitasNoDia(dataISO) {
  const familiasPorId = mapaFamiliasPorId(familiasGlobais);
  return visitasGlobais
    .filter(v => v.data_visita === dataISO)
    .map(v => ({ ...v, familia: familiasPorId.get(v.familia_id) || null }));
}

function diasComVisitaNoMes(ano, mes) {
  const set = new Set();
  visitasGlobais.forEach(v => {
    if (!v.data_visita) return;
    const d = new Date(v.data_visita + 'T00:00:00');
    if (d.getFullYear() === ano && d.getMonth() === mes) set.add(v.data_visita);
  });
  return set;
}

function renderizarCalendario() {
  const ano = dataReferencia.getFullYear();
  const mes = dataReferencia.getMonth();
  const hoje = hojeISO();

  document.getElementById('mesLabel').textContent = dataReferencia.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });

  const primeiroDiaSemana = new Date(ano, mes, 1).getDay();
  const totalDiasMes = new Date(ano, mes + 1, 0).getDate();
  const totalDiasMesAnterior = new Date(ano, mes, 0).getDate();
  const diasComVisita = diasComVisitaNoMes(ano, mes);

  const celulas = [];
  for (let i = primeiroDiaSemana - 1; i >= 0; i--) {
    celulas.push({ numero: totalDiasMesAnterior - i, outroMes: true });
  }
  for (let d = 1; d <= totalDiasMes; d++) {
    const iso = `${ano}-${String(mes + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
    celulas.push({ numero: d, outroMes: false, iso });
  }
  while (celulas.length % 7 !== 0) {
    celulas.push({ numero: celulas.length - (primeiroDiaSemana + totalDiasMes) + 1, outroMes: true });
  }

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = celulas.map(c => {
    if (c.outroMes) return `<div class="day-cell outro-mes"><span class="day-num">${c.numero}</span></div>`;
    const classes = ['day-cell'];
    if (c.iso === hoje) classes.push('hoje');
    if (c.iso === diaSelecionadoISO) classes.push('selecionado');
    if (c.iso > hoje) classes.push('futuro');
    const temVisita = diasComVisita.has(c.iso);
    return `
      <div class="${classes.join(' ')}" data-iso="${c.iso}" onclick="selecionarDia('${c.iso}')">
        <span class="day-num">${c.numero}</span>
        ${temVisita ? '<span class="day-dot"></span>' : ''}
      </div>
    `;
  }).join('');
}

function selecionarDia(iso) {
  diaSelecionadoISO = iso;
  renderizarCalendario();
  renderizarPainelDia(iso);
}

function renderizarPainelDia(iso) {
  const painel = document.getElementById('dayPanel');
  const hoje = hojeISO();
  const dataObj = new Date(iso + 'T00:00:00');
  const tituloData = dataObj.toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long' });

  let html = `<div class="day-panel-title">${tituloData}</div>`;

  if (iso > hoje) {
    html += `<div class="day-panel-sub">Data futura</div>`;
    html += `<div class="estado-vazio-futuro">Ainda não existe agendamento real para datas futuras neste sistema.<br>Em breve, quando o roteiro puder ser planejado com antecedência.</div>`;
    painel.innerHTML = html;
    return;
  }

  if (iso === hoje) {
    const pendentes = roteiroHojeGlobal.filter(f => !f.visitouHoje);
    const concluidasHoje = visitasNoDia(hoje);
    html += `<div class="day-panel-sub">${pendentes.length} pendente${pendentes.length === 1 ? '' : 's'} no roteiro · ${concluidasHoje.length} visita${concluidasHoje.length === 1 ? '' : 's'} concluída${concluidasHoje.length === 1 ? '' : 's'}</div>`;

    html += `<div class="panel-section-label">Roteiro pendente hoje</div>`;
    if (pendentes.length === 0) {
      html += `<p class="estado-vazio">Nenhuma visita pendente no roteiro de hoje. 🎉</p>`;
    } else {
      html += pendentes.slice(0, 8).map(f => `
        <a class="visit-item" href="nova-visita.html?familia_id=${f.id}">
          <span class="visit-icon pending">${f.prio.tipoPrincipal.emoji}</span>
          <span>
            <span class="visit-name">${escapeHtml(nomePrincipalDe(f))}</span>
            <div class="visit-sub">${escapeHtml(enderecoDe(f))}</div>
          </span>
        </a>
      `).join('');
    }

    html += `<div class="panel-section-label">Concluídas hoje</div>`;
    if (concluidasHoje.length === 0) {
      html += `<p class="estado-vazio">Nenhuma visita registrada ainda hoje.</p>`;
    } else {
      html += concluidasHoje.map(v => `
        <div class="visit-item">
          <span class="visit-icon done">✓</span>
          <span>
            <span class="visit-name">${escapeHtml(v.familia ? nomePrincipalDe(v.familia) : 'Família')}</span>
            <div class="visit-sub">${escapeHtml(v.desfecho || 'Visita realizada')}</div>
            ${v.observacoes ? `<div class="visit-obs">"${escapeHtml(v.observacoes.slice(0, 80))}${v.observacoes.length > 80 ? '…' : ''}"</div>` : ''}
          </span>
        </div>
      `).join('');
    }

    painel.innerHTML = html;
    return;
  }

  // Dia passado: mostra histórico real de visitas registradas naquele dia.
  const visitasDoDia = visitasNoDia(iso);
  html += `<div class="day-panel-sub">${visitasDoDia.length} visita${visitasDoDia.length === 1 ? '' : 's'} registrada${visitasDoDia.length === 1 ? '' : 's'}</div>`;

  if (visitasDoDia.length === 0) {
    html += `<p class="estado-vazio">Nenhuma visita registrada neste dia.</p>`;
  } else {
    html += visitasDoDia.map(v => `
      <div class="visit-item">
        <span class="visit-icon done">✓</span>
        <span>
          <span class="visit-name">${escapeHtml(v.familia ? nomePrincipalDe(v.familia) : 'Família removida ou não encontrada')}</span>
          <div class="visit-sub">${escapeHtml(v.familia ? enderecoDe(v.familia) : '')}${v.desfecho ? ' · ' + escapeHtml(v.desfecho) : ''}</div>
          ${v.observacoes ? `<div class="visit-obs">"${escapeHtml(v.observacoes.slice(0, 80))}${v.observacoes.length > 80 ? '…' : ''}"</div>` : ''}
        </span>
      </div>
    `).join('');
  }

  painel.innerHTML = html;
}

document.getElementById('btnMesAnterior').addEventListener('click', () => {
  dataReferencia.setMonth(dataReferencia.getMonth() - 1);
  renderizarCalendario();
});
document.getElementById('btnMesProximo').addEventListener('click', () => {
  dataReferencia.setMonth(dataReferencia.getMonth() + 1);
  renderizarCalendario();
});
document.getElementById('btnHoje').addEventListener('click', () => {
  dataReferencia = new Date();
  diaSelecionadoISO = hojeISO();
  renderizarCalendario();
  renderizarPainelDia(diaSelecionadoISO);
});

carregarAgenda();
</script>
</body>
