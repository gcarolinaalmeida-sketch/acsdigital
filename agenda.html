<style>
:root {
  --bg-app: #f9fafb;
  --bg-card: #ffffff;
  --text-main: #111827;
  --text-muted: #6b7280;
  --border: #e5e7eb;
  --radius: 16px;
  --primary: #0ea5e9;
  --primary-light: #e0f2fe;
  --success: #10b981;
  --success-light: #d1fae5;
  --warning: #f59e0b;
  --warning-light: #fef3c7;
}

* { 
  margin: 0; padding: 0; box-sizing: border-box; 
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
  -webkit-font-smoothing: antialiased;
}

body { 
  display: flex; background: var(--bg-app); color: var(--text-main); 
  height: 100vh; overflow: hidden; 
}

/* SIDEBAR - Padrão iPad */
.sidebar {
  width: 260px; background: var(--bg-card); border-right: 1px solid var(--border);
  padding: 30px 20px; display: flex; flex-direction: column; flex-shrink: 0;
  z-index: 10;
}
.sidebar h2 { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; }
.sidebar span { font-size: 13px; color: var(--text-muted); margin-top: 2px; display: block; }
.nav { margin-top: 30px; display: flex; flex-direction: column; gap: 8px; list-style: none;}
.nav a {
  text-decoration: none; font-size: 14px; font-weight: 500; color: var(--text-muted);
  padding: 10px 14px; border-radius: 10px; display: flex; align-items: center; gap: 12px; transition: all 0.2s;
}
.nav a i { font-size: 20px; }
.nav a:hover { background: #f3f4f6; color: var(--text-main); }
.nav a.active { background: var(--primary-light); color: var(--primary); font-weight: 600; }
.nav a.active i { font-family: "Phosphor-Fill"; }

/* MAIN CONTAINER (Split View) */
.main-content {
  flex: 1; display: flex; overflow: hidden;
}

/* PAINEL ESQUERDO: Calendário */
.calendar-panel {
  flex: 1; max-width: 55%; border-right: 1px solid var(--border);
  display: flex; flex-direction: column; background: var(--bg-app);
}
.calendar-header { padding: 30px 40px 20px; }
.page-title { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
.page-title h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em;}

.month-nav { display: flex; align-items: center; gap: 12px; }
.month-nav button { 
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; 
  width: 36px; height: 36px; font-size: 18px; cursor: pointer; color: var(--text-muted); transition: 0.2s;
}
.month-nav button:hover { border-color: var(--primary); color: var(--primary); }
.month-label { font-size: 16px; font-weight: 600; min-width: 140px; text-align: center; text-transform: capitalize; }
.btn-hoje { 
  background: var(--primary-light); color: var(--primary); border: none; 
  border-radius: 8px; padding: 0 16px; font-size: 13px; font-weight: 600; cursor: pointer; height: 36px;
}

.calendar-card {
  margin: 0 40px 40px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 24px; box-shadow: 0 1px 2px rgba(0,0,0,0.02);
}
.weekday-row { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 12px; }
.weekday-row span { text-align: center; font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase;}
.days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
.day-cell {
  aspect-ratio: 1; border-radius: 12px; border: 1px solid transparent;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; cursor: pointer; font-size: 14px; color: var(--text-main); position: relative;
  transition: 0.2s; font-weight: 500;
}
.day-cell:hover { background: var(--bg-app); border-color: var(--border); }
.day-cell.outro-mes { color: #d1d5db; pointer-events: none; }
.day-cell.hoje { border-color: var(--primary); font-weight: 700; color: var(--primary); }
.day-cell.selecionado { background: var(--primary); color: white; box-shadow: 0 4px 12px rgba(14, 165, 233, 0.2); border-color: var(--primary);}
.day-cell.selecionado .day-dot { background: white; }
.day-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--success); }
.day-cell.futuro { color: var(--text-muted); }

.legend-row { display: flex; gap: 16px; margin-top: 24px; font-size: 12px; color: var(--text-muted); justify-content: center;}
.legend-row span { display: flex; align-items: center; gap: 6px; }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; }

/* PAINEL DIREITO: Detalhes do Dia */
.day-panel {
  flex: 1; background: var(--bg-card); display: flex; flex-direction: column; overflow-y: auto; padding: 40px;
}
.day-panel-header { margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px;}
.day-panel-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; text-transform: capitalize; }
.day-panel-sub { font-size: 14px; color: var(--text-muted); }

.panel-section-label { 
  font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; 
  letter-spacing: 0.05em; margin: 24px 0 12px; display: flex; align-items: center; gap: 8px;
}
.estado-vazio { font-size: 14px; color: var(--text-muted); padding: 20px; text-align: center; border: 1px dashed var(--border); border-radius: 12px; background: var(--bg-app);}
.estado-vazio-futuro { font-size: 14px; color: var(--text-muted); background: var(--bg-app); border-radius: 12px; padding: 24px; text-align: center; border: 1px solid var(--border);}

.visit-item { 
  display: flex; gap: 14px; padding: 16px; border: 1px solid var(--border); 
  border-radius: 12px; margin-bottom: 10px; text-decoration: none; color: var(--text-main); transition: 0.2s;
}
.visit-item:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(14, 165, 233, 0.05); transform: translateY(-1px);}
.visit-icon { 
  width: 36px; height: 36px; border-radius: 10px; background: var(--bg-app); 
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; color: var(--text-muted);
}
.visit-icon.done { background: var(--success-light); color: var(--success); }
.visit-icon.pending { background: var(--warning-light); color: var(--warning); }
.visit-content { flex: 1; }
.visit-name { font-size: 14px; font-weight: 600; display: block; margin-bottom: 2px;}
.visit-sub { font-size: 13px; color: var(--text-muted); }
.visit-obs { font-size: 13px; color: var(--text-muted); margin-top: 6px; font-style: italic; background: var(--bg-app); padding: 8px; border-radius: 8px; border: 1px solid var(--border);}
</style>
</head>

<script>
// A sua lógica JavaScript original do 'agenda.html' vem aqui (carregarAgenda, renderizarCalendario, renderizarPainelDia, etc).
// Ajustei apenas as classes no JS abaixo para baterem com o novo CSS na hora de montar os dias e as visitas.

// --- INÍCIO DA LÓGICA MOCK PARA TESTAR O VISUAL ---
let dataReferencia = new Date();
let diaSelecionadoISO = new Date().toISOString().slice(0, 10);

function renderizarCalendarioVisual() {
  const ano = dataReferencia.getFullYear();
  const mes = dataReferencia.getMonth();
  const hoje = new Date().toISOString().slice(0, 10);
  
  document.getElementById('mesLabel').textContent = dataReferencia.toLocaleDateString('pt-BR', { month: 'long', year: 'numeric' });
  
  const primeiroDiaSemana = new Date(ano, mes, 1).getDay();
  const totalDiasMes = new Date(ano, mes + 1, 0).getDate();
  const totalDiasMesAnterior = new Date(ano, mes, 0).getDate();

  const celulas = [];
  for (let i = primeiroDiaSemana - 1; i >= 0; i--) celulas.push({ numero: totalDiasMesAnterior - i, outroMes: true });
  for (let d = 1; d <= totalDiasMes; d++) celulas.push({ numero: d, outroMes: false, iso: `${ano}-${String(mes + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}` });
  while (celulas.length % 7 !== 0) celulas.push({ numero: celulas.length - (primeiroDiaSemana + totalDiasMes) + 1, outroMes: true });

  const grid = document.getElementById('daysGrid');
  grid.innerHTML = celulas.map(c => {
    if (c.outroMes) return `<div class="day-cell outro-mes">${c.numero}</div>`;
    const classes = ['day-cell'];
    if (c.iso === hoje) classes.push('hoje');
    if (c.iso === diaSelecionadoISO) classes.push('selecionado');
    if (c.iso > hoje) classes.push('futuro');
    
    // Simulando alguns dias com visita (dias pares do passado)
    const temVisita = c.iso <= hoje && c.numero % 2 === 0; 
    
    return `
      <div class="${classes.join(' ')}" onclick="selecionarDia('${c.iso}')">
        ${c.numero}
        ${temVisita ? '<span class="day-dot"></span>' : ''}
      </div>
    `;
  }).join('');
}

function selecionarDia(iso) {
  diaSelecionadoISO = iso;
  renderizarCalendarioVisual();
  renderizarPainelDiaVisual(iso);
}
