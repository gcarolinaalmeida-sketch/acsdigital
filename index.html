<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACS Digital - Micro-área 03</title>
    <style>
        :root {
            --bg-color: #FAFAFA;
            --surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --primary: #0A84FF;
            --danger: #FF3B30;
            --success: #34C759;
            --warning: #FF9500;
            --radius: 12px;
            --chip-bg: #F2F2F7;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Minimalista */
        .sidebar {
            width: 260px;
            background-color: var(--bg-color);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .sidebar-header h2 {
            font-size: 14px;
            font-weight: 600;
        }

        .sidebar-header span {
            font-size: 12px;
            color: var(--text-muted);
        }

        .nav-links {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .nav-links li a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 14px;
            padding: 8px 12px;
            border-radius: var(--radius);
            display: block;
            transition: all 0.2s;
        }

        .nav-links li a:hover, .nav-links li a.active {
            background-color: #F3F4F6;
            color: var(--text-main);
            font-weight: 500;
        }

        /* Área de Conteúdo Principal */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .topbar {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 48px;
            border-bottom: 1px solid var(--border);
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .breadcrumb {
            font-size: 14px;
            color: var(--text-muted);
        }

        .content-wrapper {
            padding: 48px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .page-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Seções e Cards */
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 600;
        }

        /* Grid de Prioridades */
        .priority-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 16px;
            margin-bottom: 48px;
        }

        .card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card-tag {
            font-size: 12px;
            font-weight: 500;
            display: inline-block;
        }

        .tag-urgent { color: var(--danger); }
        .tag-return { color: #F59E0B; }
        .tag-goal { color: var(--success); }

        .card-title {
            font-size: 16px;
            font-weight: 500;
        }

        .card-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: auto;
        }

        .card-action {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            text-decoration: none;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 8px;
        }

        /* Grid de Indicadores */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 48px;
        }

        .metric-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
        }

        .metric-value {
            font-size: 28px;
            font-weight: 600;
            margin: 8px 0 4px 0;
        }

        .metric-trend {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* Responsividade para telas menores/iPad */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--border); padding: 16px; }
            .topbar, .content-wrapper { padding: 24px; }
            .page-header { flex-direction: column; align-items: flex-start; gap: 16px; }
        }

</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>UBS Guarda-Mor</h2>
            <span>Micro-área 03</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html" class="active">Início</a></li>
            <li><a href="nova-visita.html">Visitas Diárias</a></li>
            <li><a href="familias.html">Famílias</a></li>
            <li><a href="mapa.html">Mapa da Micro-área</a></li>
            <li><a href="indicadores.html">Indicadores</a></li>
        </ul>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        
        <!-- Topbar -->
        <header class="topbar">
            <div class="breadcrumb">Início / Dashboard</div>
            <div class="user-menu" style="font-size: 14px; color: var(--text-muted);">
                Buscar (Cmd+K) &nbsp;&nbsp;|&nbsp;&nbsp; Perfil
            </div>
        </header>

        <!-- Wrapper do Conteúdo -->
        <div class="content-wrapper">
            
            <div class="page-header">
                <div>
                    <h1>Bom dia, Gabriela.</h1>
                    <p>Aqui está o seu panorama para hoje.</p>
                </div>
               <button class="btn-primary" onclick="window.location.href='nova-visita.html'">+ Nova Visita</button>
            </div>

            <!-- Ações Prioritárias -->
            <div class="section-title">Ações Prioritárias</div>
            <div class="priority-grid">
                
                <div class="card">
                    <span class="card-tag tag-urgent">● Urgente</span>
                    <div class="card-title">Gestante no 3º Trimestre</div>
                    <div class="card-desc">Família Silva - Rua A, 12</div>
                    <a href="#" class="card-action">Iniciar Visita →</a>
                </div>

                <div class="card">
                    <span class="card-tag tag-return">● Retorno</span>
                    <div class="card-title">Recém-nascido (5 dias)</div>
                    <div class="card-desc">Família Costa - Beco 2</div>
                    <a href="#" class="card-action">Iniciar Visita →</a>
                </div>

                <div class="card">
                    <span class="card-tag tag-goal">● Meta do Mês</span>
                    <div class="card-title">Visitas Domiciliares</div>
                    <div class="card-desc">112 de 150 realizadas</div>
                    <div style="height: 4px; background: var(--border); border-radius: 2px; margin-top: 12px; overflow: hidden;">
                        <div style="width: 75%; height: 100%; background: var(--success);"></div>
                    </div>
                </div>

            </div>

            <!-- Indicadores -->
            <div class="section-title">Indicadores da Micro-área 03</div>
            <div class="metrics-grid">
                
                <div class="metric-card">
                    <div class="section-title" style="margin-bottom: 0;">Famílias</div>
                    <div class="metric-value">145</div>
                    <div class="metric-trend">+2 cadastradas este mês</div>
                </div>

                <div class="metric-card">
                    <div class="section-title" style="margin-bottom: 0;">Hipertensos (HAS)</div>
                    <div class="metric-value">42</div>
                    <div class="metric-trend">100% acompanhados</div>
                </div>

                <div class="metric-card">
                    <div class="section-title" style="margin-bottom: 0;">Diabéticos (DM)</div>
                    <div class="metric-value">18</div>
                    <div class="metric-trend">2 pendentes de visita</div>
                </div>

            </div>

        </div>
    </main>

</body>
</html>
