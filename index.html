<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ACS Digital</title>

<style>

:root {
  --bg-color: #ffffff;
  --surface: #ffffff;
  --text-main: #111111;
  --text-muted: #6b7280;
  --border: rgba(0,0,0,0.08);
  --primary: #0a84ff;

  --radius: 10px;
  --chip-bg: #f6f6f6;
}

/* base */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
}

body {
  display: flex;
  background: var(--bg-color);
  color: var(--text-main);
  height: 100vh;
  overflow: hidden;
}

/* sidebar (mais leve, estilo Notion) */
.sidebar {
  width: 240px;
  background: #fff;
  border-right: 1px solid var(--border);
  padding: 20px 14px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.sidebar-header h2 {
  font-size: 13px;
  font-weight: 600;
}

.sidebar-header span {
  font-size: 12px;
  color: var(--text-muted);
}

.nav-links {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.nav-links li a {
  text-decoration: none;
  color: var(--text-muted);
  font-size: 13px;
  padding: 8px 10px;
  border-radius: 8px;
  display: flex;
  gap: 8px;
}

.nav-links li a:hover,
.nav-links li a.active {
  background: #f5f5f5;
  color: var(--text-main);
}

/* main */
.main-content {
  flex: 1;
  overflow-y: auto;
  background: #fff;
}

/* topo estilo Notion (quase invisível) */
.topbar {
  height: 50px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  border-bottom: 1px solid var(--border);
  background: #fff;
}

.breadcrumb {
  font-size: 13px;
  color: var(--text-muted);
}

/* conteúdo */
.content-wrapper {
  max-width: 980px;
  margin: 0 auto;
  padding: 28px 32px 80px;
}

/* HERO mais Notion (menos “dashboard”) */
.hero h1 {
  font-size: 22px;
  font-weight: 600;
}

.hero-meta {
  margin-top: 6px;
  font-size: 13px;
  color: var(--text-muted);
}

/* botão principal (menos chamativo) */
.btn-roteiro {
  margin-top: 18px;
  width: 100%;
  padding: 14px 16px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: #111;
  color: #fff;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
}

.btn-roteiro:hover {
  opacity: 0.9;
}

/* seções estilo Notion */
.section-block {
  margin-top: 28px;
}

.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 10px;
}

/* cards viram “blocos leves” */
.summary-grid,
.priority-grid,
.metrics-grid,
.quick-grid {
  display: grid;
  gap: 10px;
}

.summary-grid {
  grid-template-columns: repeat(6, 1fr);
}

.summary-tile,
.priority-card,
.metric-card,
.quick-action {
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  box-shadow: none;
}

/* menos contraste visual */
.summary-value {
  font-size: 18px;
  font-weight: 600;
}

.summary-label {
  font-size: 12px;
  color: var(--text-muted);
}

/* prioridades mais discretas */
.priority-card {
  border-left: 2px solid var(--border);
}

.priority-name {
  font-size: 14px;
  font-weight: 600;
}

.priority-address {
  font-size: 12px;
  color: var(--text-muted);
}

/* alertas estilo lista (Notion puro) */
.alert-row {
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 10px;
  display: flex;
  gap: 10px;
  align-items: center;
  background: #fff;
}

/* ações rápidas mais leves */
.quick-action {
  text-decoration: none;
  color: var(--text-main);
  font-size: 13px;
}

.quick-action:hover {
  background: #f7f7f7;
}

/* mobile */
@media (max-width: 768px) {
  body { flex-direction: column; overflow: auto; }

  .sidebar { display: none; }

  .content-wrapper {
    padding: 18px 16px 80px;
  }

  .summary-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .topbar {
    padding: 0 16px;
  }
}
  
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <div class="header">
    <div class="title">ACS Digital</div>
    <div class="subtitle">Microárea 02 • ESF Guarda-Mor</div>
  </div>

  <!-- ATALHOS -->
  <div class="section">
    <div class="section-title">Atalhos</div>

    <div class="card">
      <div class="card-title">Visitas do dia</div>
      <div class="card-desc">Abrir roteiro de visitas domiciliares</div>
    </div>

    <div class="card">
      <div class="card-title">Famílias</div>
      <div class="card-desc">Lista de famílias cadastradas</div>
    </div>

    <div class="card">
      <div class="card-title">Cadastros</div>
      <div class="card-desc">Atualizar dados de usuários</div>
    </div>
  </div>

  <!-- ROTINA -->
  <div class="section">
    <div class="section-title">Rotina</div>

    <div class="card">
      <div class="card-title">Planejamento do dia</div>
      <div class="card-desc">Organizar visitas e prioridades</div>
    </div>

    <div class="card">
      <div class="card-title">Visitas pendentes</div>
      <div class="card-desc">Pendências não concluídas</div>
    </div>
  </div>

  <!-- ALERTAS -->
  <div class="section">
    <div class="section-title">Alertas</div>

    <div class="card">
      <div class="card-title">Gestantes em atraso</div>
      <div class="card-desc">Revisar acompanhamento</div>
    </div>

    <div class="card">
      <div class="card-title">Hipertensos sem controle</div>
      <div class="card-desc">Necessitam atenção</div>
    </div>
  </div>

</div>

</body>
</html>
