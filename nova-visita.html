<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova Visita - ACS Digital</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        :root {
            --bg-color: #FAFAFA;
            --surface: #FFFFFF;
            --text-main: #111827;
            --text-muted: #6B7280;
            --border: #E5E7EB;
            --primary: #0A84FF;
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FF9500;
            --radius: 12px;
            --chip-bg: #F2F2F7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }

        body { background-color: var(--bg-color); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Navbar Superior */
        .navbar {
            height: 60px;
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            flex-shrink: 0;
            z-index: 10;
        }

        .navbar h1 { font-size: 16px; font-weight: 600; }
        .btn-text { background: none; border: none; color: var(--text-muted); font-size: 16px; cursor: pointer; }
        .btn-save { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; opacity: 0.5; pointer-events: none; }
        .btn-save.active { opacity: 1; pointer-events: auto; }

        /* Estrutura Principal (Split View) */
        .container { display: flex; flex: 1; overflow: hidden; }

        /* Lado Esquerdo - Contexto */
        .sidebar-context {
            width: 35%;
            background-color: var(--bg-color);
            border-right: 1px solid var(--border);
            padding: 32px;
            overflow-y: auto;
        }

        .family-info h2 { font-size: 20px; margin-bottom: 8px; }
        .info-row { display: flex; gap: 8px; color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
        .divider { height: 1px; background-color: var(--border); margin: 24px 0; }
        .section-label { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.5px; margin-bottom: 12px; }
        .history-text { font-size: 14px; margin-bottom: 4px; }
        .alert-text { color: var(--warning); font-size: 14px; font-weight: 500; margin-top: 8px; }

        /* Lado Direito - Ação */
        .main-action {
            width: 65%;
            background-color: var(--surface);
            padding: 40px;
            overflow-y: auto;
        }

        /* Chips */
        .chip-group { display: flex; flex-wrap: wrap; gap: 12px; }
        .chip {
            background-color: var(--chip-bg);
            border: 1px solid transparent;
            padding: 10px 16px;
            border-radius: 24px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-main);
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }
        .chip:hover { background-color: #E5E5EA; }
        .chip.selected { background-color: var(--primary); color: white; }

        /* Observações */
        textarea {
            width: 100%;
            height: 100px;
            background-color: var(--chip-bg);
            border: 1px solid transparent;
            border-radius: var(--radius);
            padding: 16px;
            font-size: 15px;
            resize: none;
            outline: none;
        }
        textarea:focus { border-color: var(--primary); }

        /* Botão de Assinatura */
        .btn-signature {
            width: 100%;
            padding: 16px;
            background-color: rgba(10, 132, 255, 0.1);
            color: var(--primary);
            border: 1px dashed var(--primary);
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-signature.signed { background-color: var(--success); color: white; border-style: solid; border-color: var(--success); }

        /* Modal de Assinatura */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: var(--surface); width: 90%; max-width: 600px;
            border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 16px;
        }
        .canvas-container { border: 2px solid var(--border); border-radius: 12px; background: #fff; overflow: hidden; touch-action: none; }
        canvas { width: 100%; height: 250px; cursor: crosshair; display: block; }
        .modal-actions { display: flex; justify-content: space-between; margin-top: 8px; }
        .btn-clear { color: var(--danger); background: none; border: none; font-size: 15px; font-weight: 600; cursor: pointer; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        @media (max-width: 768px) {
            .container { flex-direction: column; overflow-y: auto; }
            .sidebar-context, .main-action { width: 100%; border-right: none; }
            .sidebar-context { padding: 24px; border-bottom: 1px solid var(--border); }
            .main-action { padding: 24px; }
            body { height: auto; min-height: 100vh; overflow-y: auto; }
        }
    </style>
</head>
<body>

    <header class="navbar">
        <button class="btn-text" id="btnCancelar">Cancelar</button>
        <h1>Nova Visita</h1>
        <button class="btn-save" id="btnSalvar">Salvar Visita</button>
    </header>

    <div class="container">
        
        <aside class="sidebar-context">
            <div class="family-info" id="familyContext">
                <h2>Carregando família...</h2>
            </div>
            <div class="divider"></div>
            <div class="history-info" id="historyInfo">
                <div class="section-label">HISTÓRICO RESUMIDO</div>
                <div class="history-text">Carregando...</div>
            </div>
        </aside>

        <main class="main-action">
            <div class="section-label">DESFECHO DA VISITA (Obrigatório)</div>
            <div class="chip-group" id="desfechoGroup" style="margin-bottom: 32px;">
                <div class="chip" data-type="radio">Realizada</div>
                <div class="chip" data-type="radio">Ausente</div>
                <div class="chip" data-type="radio">Recusada</div>
            </div>

            <div class="section-label">ACOMPANHAMENTOS REALIZADOS</div>
            <div class="chip-group" id="acompanhamentosGroup" style="margin-bottom: 32px;">
                <div class="chip" data-type="checkbox">🫀 Hipertenso</div>
                <div class="chip" data-type="checkbox">🍬 Diabético</div>
                <div class="chip" data-type="checkbox">🤰 Gestante</div>
            </div>

            <div class="section-label">OBSERVAÇÕES</div>
            <textarea id="observacoesTexto" placeholder="Descreva como foi a visita..." style="margin-bottom: 32px;"></textarea>

            <div class="section-label">ASSINATURA DO PACIENTE (Obrigatório)</div>
            <button class="btn-signature" id="btnAbrirAssinatura">✍️ Coletar Assinatura</button>
        </main>
    </div>

    <div class="modal-overlay" id="modalAssinatura">
        <div class="modal-content">
            <div class="section-label" style="text-align: center;">ASSINE NO QUADRO ABAIXO</div>
            <div class="canvas-container">
                <canvas id="signatureCanvas"></canvas>
            </div>
            <div class="modal-actions">
                <button class="btn-clear" id="btnLimpar">Limpar</button>
                <div>
                    <button class="btn-text" id="btnCancelarModal" style="margin-right: 16px;">Cancelar</button>
                    <button class="btn-confirm" id="btnConfirmarAssinatura">Confirmar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const familiaId = params.get('familia_id');

        // Variáveis de controle
        let desfechoPreenchido = false;
        let assinaturaColetada = false;
        let desfechoSelecionado = null;

        async function carregarContexto() {
            const contextEl = document.getElementById('familyContext');
            const historyEl = document.getElementById('historyInfo');

            if (!familiaId) {
                contextEl.innerHTML = `<h2>⚠️ Nenhuma família selecionada</h2><div class="info-row">Acesse esta tela a partir do Diretório de Famílias.</div>`;
                historyEl.innerHTML = '';
                return;
            }

            const { data: familia, error } = await db
                .from('familias')
                .select('*, cidadaos(*)')
                .eq('id', familiaId)
                .single();

            if (error || !familia) {
                contextEl.innerHTML = `<h2>Família não encontrada</h2>`;
                console.error(error);
                return;
            }

            const endereco = [familia.logradouro, familia.numero, familia.complemento].filter(Boolean).join(', ');
            contextEl.innerHTML = `
                <h2>👨‍👩‍👧 ${endereco || 'Família'}</h2>
                <div class="info-row">📍 ${familia.bairro || ''}</div>
                <div class="info-row">${(familia.cidadaos || []).length} morador(es)</div>
            `;

            const { data: ultimaVisita } = await db
                .from('visitas')
                .select('data_visita')
                .eq('familia_id', familiaId)
                .order('data_visita', { ascending: false })
                .limit(1)
                .maybeSingle();

            historyEl.innerHTML = `
                <div class="section-label">HISTÓRICO RESUMIDO</div>
                <div class="history-text"><strong>Última Visita:</strong> ${ultimaVisita ? formatarDataBR(ultimaVisita.data_visita) : 'Nenhuma visita registrada ainda'}</div>
            `;
        }

        // 1. Lógica dos Chips de Desfecho
        const desfechoChips = document.querySelectorAll('#desfechoGroup .chip');
        desfechoChips.forEach(chip => {
            chip.addEventListener('click', () => {
                desfechoChips.forEach(c => c.classList.remove('selected'));
                chip.classList.add('selected');
                desfechoPreenchido = true;
                desfechoSelecionado = chip.textContent.trim();
                validarFormulario();
            });
        });

        // 2. Lógica dos Chips de Acompanhamento
        const acompanhamentoChips = document.querySelectorAll('#acompanhamentosGroup .chip');
        acompanhamentoChips.forEach(chip => {
            chip.addEventListener('click', () => chip.classList.toggle('selected'));
        });

        // 3. Validação do Botão Salvar
        const btnSalvar = document.getElementById('btnSalvar');
        function validarFormulario() {
            if (desfechoPreenchido && assinaturaColetada) {
                btnSalvar.classList.add('active');
            } else {
                btnSalvar.classList.remove('active');
            }
        }

        // 4. Lógica do Modal de Assinatura
        const modal = document.getElementById('modalAssinatura');
        const btnAbrir = document.getElementById('btnAbrirAssinatura');
        const canvas = document.getElementById('signatureCanvas');
        const ctx = canvas.getContext('2d');
        let desenhando = false, assinou = false;

        function redimensionarCanvas() {
            canvas.width = canvas.parentElement.clientWidth;
            canvas.height = 250;
            ctx.lineWidth = 3; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';
        }

        btnAbrir.addEventListener('click', () => {
            modal.classList.add('active');
            setTimeout(redimensionarCanvas, 50); // Dá tempo para o modal abrir antes de medir o canvas
        });

        document.getElementById('btnCancelarModal').addEventListener('click', () => modal.classList.remove('active'));

        // Eventos de Desenho no Canvas
        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            const clienteY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clienteX - rect.left, y: clienteY - rect.top };
        }

        function iniciarDesenho(e) { e.preventDefault(); desenhando = true; assinou = true; ctx.beginPath(); ctx.moveTo(getPos(e).x, getPos(e).y); }
        function desenhar(e) { if (!desenhando) return; e.preventDefault(); ctx.lineTo(getPos(e).x, getPos(e).y); ctx.stroke(); }
        function pararDesenho() { desenhando = false; }

        canvas.addEventListener('mousedown', iniciarDesenho);
        canvas.addEventListener('mousemove', desenhar);
        canvas.addEventListener('mouseup', pararDesenho);
        canvas.addEventListener('touchstart', iniciarDesenho, {passive: false});
        canvas.addEventListener('touchmove', desenhar, {passive: false});
        canvas.addEventListener('touchend', pararDesenho);

        document.getElementById('btnLimpar').addEventListener('click', () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            assinou = false;
        });

        document.getElementById('btnConfirmarAssinatura').addEventListener('click', () => {
            if (assinou) {
                assinaturaColetada = true;
                btnAbrir.classList.add('signed');
                btnAbrir.innerHTML = '✔️ Assinatura Coletada';
                modal.classList.remove('active');
                validarFormulario();
            } else {
                alert("Por favor, assine no quadro.");
            }
        });

        // 5. Lógica de Navegação (Cancelar e Salvar)
        const btnCancelar = document.getElementById('btnCancelar');
        btnCancelar.addEventListener('click', () => {
            if (desfechoPreenchido || assinaturaColetada) {
                if (confirm("Tem certeza que deseja cancelar? Os dados não salvos serão perdidos.")) {
                    window.location.href = 'familias.html';
                }
            } else {
                window.location.href = 'familias.html';
            }
        });

        btnSalvar.addEventListener('click', async () => {
            if (!btnSalvar.classList.contains('active')) return;
            if (!familiaId) {
                alert('Nenhuma família selecionada, não é possível salvar.');
                return;
            }

            const acompanhamentos = Array.from(document.querySelectorAll('#acompanhamentosGroup .chip.selected'))
                .map(c => c.textContent.trim());

            const novaVisita = {
                familia_id: familiaId,
                data_visita: new Date().toISOString().slice(0, 10),
                desfecho: desfechoSelecionado,
                acompanhamentos,
                observacoes: document.getElementById('observacoesTexto').value.trim() || null,
                assinatura_coletada: true,
                profissional: 'ACS',
            };

            const { error } = await db.from('visitas').insert(novaVisita);
            if (error) {
                alert('Erro ao salvar a visita: ' + error.message);
                console.error(error);
                return;
            }

            alert("Visita salva com sucesso!");
            window.location.href = 'familias.html';
        });

        carregarContexto();
    </script>
</body>
</html>
